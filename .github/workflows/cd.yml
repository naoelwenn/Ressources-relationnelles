name: CD - Docker Hub

on:
  push:
    branches: ["main", "master"]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  IMAGE_API: ${{ secrets.DOCKERHUB_USERNAME }}/ressourcesr-api
  IMAGE_CLIENT: ${{ secrets.DOCKERHUB_USERNAME }}/ressourcesr-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ github.sha }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_API }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_API }}:buildcache,mode=max

      - name: Build & Push Client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE_CLIENT }}:${{ github.sha }}
            ${{ env.IMAGE_CLIENT }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_CLIENT }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_CLIENT }}:buildcache,mode=max


